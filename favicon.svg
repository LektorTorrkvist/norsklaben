<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background: rounded square in site primary green -->
  <rect width="100" height="100" rx="18" fill="#1A3D2B"/>

  <!-- Subtle inner highlight for depth -->
  <rect x="1" y="1" width="98" height="50" rx="17" fill="rgba(255,255,255,0.04)"/>

  <!-- "N" in Playfair Display serif style, hand-tuned paths for crisp small-size rendering -->
  <text
    x="50"
    y="76"
    font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif"
    font-size="74"
    font-weight="700"
    fill="#FFFFFF"
    text-anchor="middle"
    dominant-baseline="auto"
    letter-spacing="-1"
  >N</text>
</svg>
