<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skriverens verktøykasse - Norsklaben</title>
</head>
<body>
<script>
(function () {
  function injectLangToggleCss(html) {
    if (/\.lang-toggle\s*\{/.test(html)) {
      return html;
    }

    var css = [
      "\n/* --- Language toggle --- */",
      ".lang-toggle {",
      "  display: inline-flex;",
      "  align-items: center;",
      "  gap: 0;",
      "  margin-left: .5rem;",
      "  border: 1px solid rgba(255,255,255,.25);",
      "  border-radius: var(--rs);",
      "  overflow: hidden;",
      "}",
      ".lang-toggle a {",
      "  padding: .3rem .55rem;",
      "  font-size: .78rem;",
      "  font-weight: 600;",
      "  color: rgba(255,255,255,.6);",
      "  text-decoration: none;",
      "  transition: all .2s;",
      "  line-height: 1;",
      "}",
      ".lang-toggle a:hover {",
      "  color: #fff;",
      "  background: rgba(255,255,255,.1);",
      "}",
      ".lang-toggle a.active {",
      "  color: #fff;",
      "  background: rgba(255,255,255,.18);",
      "  pointer-events: none;",
      "}",
      ""
    ].join("\n");

    return html.replace(/(\.nav-dropdown:hover[\s\S]*?\}\n)/, "$1" + css);
  }

  function replaceNav(html) {
    var nav = [
      "<nav>",
      "    <a href=\"skrivelab-bm.html\">Skrivelab</a>",
      "    <a href=\"nynorsklab.html\">Nynorsklab</a>",
      "    <a href=\"verktoyskasse-bm.html\" class=\"active\">Verktøykasse</a>",
      "    <a href=\"undervisingsbank-bm.html\">Undervisningsbank</a>",
      "    <div class=\"nav-dropdown\">",
      "      <button class=\"nav-dropbtn\" type=\"button\" aria-expanded=\"false\">Lekekassa</button>",
      "      <div class=\"nav-dropmenu\">",
      "        <a href=\"mad-libs.html\">Mad Libs</a>",
      "        <a href=\"vurderingslab.html\">Vurderingslab</a>",
      "      </div>",
      "    </div>",
      "    <div class=\"lang-toggle\" aria-label=\"Velg målform\">",
      "      <a href=\"verktoyskasse.html\" title=\"Nynorsk\">NN</a>",
      "      <a href=\"verktoyskasse-bm.html\" class=\"active\" title=\"Bokmål\">BM</a>",
      "    </div>",
      "  </nav>"
    ].join("\n");

    return html.replace(/<nav>[\s\S]*?<\/nav>/, nav);
  }

  function translateUserText(html) {
    var replacements = [
      [/<!DOCTYPE html>/g, "<!DOCTYPE html>"],
      [/<html lang=\"nn\">/g, "<html lang=\"nb\">"],
      [/<title>Skrivarens verktøykasse – Norsklaben<\/title>/g, "<title>Skriverens verktøykasse - Norsklaben<\/title>"],
      [/Skrivarens verktøykasse/g, "Skriverens verktøykasse"],
      [/Skriverettleiing/g, "Skriveveiledning"],
      [/Trendar/g, "Trender"],
      [/Sjangrar/g, "Sjangre"],
      [/Novelle-oppgåver/g, "Novelleoppgaver"],
      [/Vanlegaste/g, "Vanligste"],
      [/vanlegaste/g, "vanligste"],
      [/svært mange elevar/g, "svært mange elever"],
      [/Mange skriv bra, men gløymer/g, "Mange skriver bra, men glemmer"],
      [/kvar informasjonen kjem frå/g, "hvor informasjonen kommer fra"],
      [/kjeldeliste/g, "kildeliste"],
      [/kjelde/g, "kilde"],
      [/kjelder/g, "kilder"],
      [/kjelder\./g, "kilder."],
      [/kjeldelista/g, "kildelista"],
      [/fagartikkel/g, "fagartikkel"],
      [/Oppgåve/g, "Oppgave"],
      [/oppgåve/g, "oppgave"],
      [/Slik gjer du det:/g, "Slik gjør du det:"],
      [/Du treng:/g, "Du trenger:"],
      [/skuletime/g, "skoletime"],
      [/skuletimar/g, "skoletimer"],
      [/skulen/g, "skolen"],
      [/sidemannen/g, "sidemannen"],
      [/sjølv/g, "selv"],
      [/sjølve/g, "selve"],
      [/sjølv om/g, "selv om"],
      [/òg/g, "også"],
      [/medvite/g, "bevisst"],
      [/tydeleg/g, "tydelig"],
      [/Utdjup/g, "Utdyp"],
      [/utdjupa/g, "utdypet"],
      [/forsking/g, "forskning"],
      [/særleg/g, "særlig"],
      [/drøft/g, "drøft"],
      [/følgjeleg/g, "følgelig"],
      [/kvifor/g, "hvorfor"],
      [/korleis/g, "hvordan"],
      [/kva/g, "hva"],
      [/ein /g, "en "],
      [/eitt /g, "ett "],
      [/éi /g, "en "],
      [/eige/g, "eget"],
      [/eiga/g, "egen"],
      [/åleine/g, "alene"],
      [/høyrer/g, "hører"],
      [/høgt/g, "høyt"],
      [/høve/g, "mulighet"],
      [/frå/g, "fra"],
      [/utan/g, "uten"],
      [/vert/g, "blir"],
      [/difor/g, "derfor"],
      [/berre/g, "bare"],
      [/mogle[g]?/g, "mulig"],
      [/moglegheiter/g, "muligheter"],
      [/forfattar/g, "forfatter"],
      [/forteljande/g, "fortellende"],
      [/forteljinga/g, "fortellingen"],
      [/novella/g, "novellen"],
      [/novelleforfattaren/g, "novelleforfatteren"],
      [/Førre/g, "Forrige"],
      [/Neste/g, "Neste"],
      [/Oppsummering · neste steg/g, "Oppsummering · neste steg"],
      [/Vel målform/g, "Velg målform"],
      [/Nynorsk/g, "Nynorsk"],
      [/Bokmål/g, "Bokmål"],
      [/Leikekassa/g, "Lekekassa"],
      [/Undervisingsbank/g, "Undervisningsbank"],
      [/verkemiddel/g, "virkemidler"],
      [/læringsmål/g, "læringsmål"],
      [/Læringsmål/g, "Læringsmål"],
      [/sveip/g, "sveip"],
      [/bla/g, "bla"],
      [/Kva er ei novelle\?/g, "Hva er en novelle?"],
      [/Kjenneteikn/g, "Kjennetegn"],
      [/spenningskurva/g, "spenningskurven"],
      [/øvingsoppgåver/g, "øvingsoppgaver"],
      [/øving/g, "øving"],
      [/øvingar/g, "øvinger"],
      [/Meir/g, "Mer"],
      [/teiknsetting/g, "tegnsetting"],
      [/setningar/g, "setninger"],
      [/setningar/g, "setninger"],
      [/setning/g, "setning"],
      [/skrivemal/g, "skrivemal"],
      [/hovudperson/g, "hovedperson"],
      [/hovuddel/g, "hoveddel"],
      [/avslutting/g, "avslutning"],
      [/innleiing/g, "innledning"],
      [/stikkord/g, "stikkord"],
      [/vendepunkt/g, "vendepunkt"],
      [/spørsmål/g, "spørsmål"],
      [/vanskeleg/g, "vanskelig"],
      [/vanskelege/g, "vanskelige"],
      [/fargepennar/g, "fargepenner"],
      [/fargepennar/g, "fargepenner"],
      [/fargepenn/g, "fargepenn"],
      [/skrivebok/g, "skrivebok"],
      [/Sjekk svaret/g, "Sjekk svaret"],
      [/Start på nytt/g, "Start på nytt"],
      [/Nullstill/g, "Nullstill"],
      [/Fullskjerm/g, "Fullskjerm"],
      [/Lukk fullskjerm/g, "Lukk fullskjerm"],
      [/Oppgåve ([0-9]+)/g, "Oppgave $1"],
      [/Oppgåve /g, "Oppgave "],
      [/Oppgåvene/g, "Oppgavene"],
      [/Oppgåvene/g, "Oppgavene"]
    ];

    for (var i = 0; i < replacements.length; i += 1) {
      html = html.replace(replacements[i][0], replacements[i][1]);
    }

    return html;
  }

  fetch("verktoyskasse.html", { cache: "no-store" })
    .then(function (response) {
      if (!response.ok) {
        throw new Error("Kunne ikke laste verktoyskasse.html");
      }
      return response.text();
    })
    .then(function (html) {
      var transformed = html;
      transformed = injectLangToggleCss(transformed);
      transformed = replaceNav(transformed);
      transformed = translateUserText(transformed);

      document.open();
      document.write(transformed);
      document.close();
    })
    .catch(function (error) {
      document.body.innerHTML = "<main style='font-family: sans-serif; max-width: 720px; margin: 3rem auto; line-height: 1.6;'><h1>Kunne ikke laste verktoykasse-bm.html</h1><p>Feil: " + String(error && error.message ? error.message : error) + "</p></main>";
    });
})();
</script>
</body>
</html>
